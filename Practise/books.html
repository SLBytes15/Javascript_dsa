<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Repo</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: antiquewhite;

        }
        .heading{
            text-align: center;
            font-size: 20px;
        }
        .inputBook{
            display:block;
            text-align: center;
        }
        .inputBook input{
            padding: 5px 7px;
            margin: 18px 0;
            border: 2px solid #ccc;
            border-radius: 3px;
        }
        input::placeholder {
            color: #999;
            font-style: italic;
            opacity: 1; 
        }
        .booksList{
            margin: 20px;
        }
        #books{
            font-size: medium;
        }
        #books button{  
            cursor: pointer;
        }



    </style>
</head>
<body>
  
<div class="Content">
    <div class="heading">
        <h2>Book Repo</h2>
        <p>Add your books to store inside the Book Repo</p>
    </div>
    <div class="inputBook">
        <input type="text" id="bookName" placeholder="Enter Book Name">
        <input type="text" id="authorName" placeholder="Enter Author Name">
        <input type="text" id="bookDescription" placeholder="Enter Book Description">
        <input type="number" id="pageNumber" placeholder="Enter Page Number">
        <button onclick="addBooks()">Add</button>
        <p id="status"></p>
    </div>
    <div class="booksList">
            <h2>Books List</h2>
            <div id="books"></div>
            </div>
    </div>






    <script>let books = JSON.parse(localStorage.getItem('books')) || [];
    // showbooks(); 


        function addBooks() {
            const bookName = document.getElementById('bookName').value;
            const authorName = document.getElementById('authorName').value;
            const bookDescription = document.getElementById('bookDescription').value;
            const pageNumber = parseInt(document.getElementById('pageNumber').value);
            const currdate = new Date().toDateString('en-us');
            

            if (bookName && authorName && bookDescription && pageNumber) {
                const book = {
                    name: bookName,
                    authorName: authorName,
                    bookDescription: bookDescription,
                    pageNumber: pageNumber,
                    date: currdate,
                };
                setTimeout(() => {
                    document.getElementById('status').textContent = 'Book added!';
                }, 1000);
                    books.push(book);
                    localStorage.setItem('books', JSON.stringify(books));
                    showbooks();
                    clearInputs();
                    document.getElementById('status').textContent = '';
            }
            else {
                alert("please fill in all fields correctly");
            }

        }

        function showbooks() {
            const booksDiv = books.map(
                (book, index) => `<h3>Book Number - ${index + 1}</h3>
        <p><strong>Book Name: </strong>${book.name}</p>
        <p><strong>Author Name:</strong> ${book.authorName}</p>
        <p><strong>Book Description:</strong> ${book.bookDescription}</p>
        <p><strong>No. of Pages:</strong> ${book.pageNumber} page(s)</p>
        <p><strong>Date Added:</strong> ${book.date}</p>
        <button onclick="editbook(${index})">Edit</button>
        <button onclick="deleteBook(${index})">Delete</button>
        `
            );
            document.getElementById('books').innerHTML = booksDiv.join('');
        }

        function editbook(index) {
            const book = books[index];
            document.getElementById('bookName').value = book.name;
            document.getElementById("authorName").value = book.authorName;
            document.getElementById("bookDescription").value = book.bookDescription;
            document.getElementById("pageNumber").value = book.pageNumber;
            books.splice(index, 1);
            localStorage.setItem('books',JSON.stringify(books));
            showbooks();
        }

        function clearInputs() {
            document.getElementById("bookName").value = "";
            document.getElementById("authorName").value = "";
            document.getElementById("bookDescription").value = "";
            document.getElementById("pageNumber").value = "";
        }
        function deleteBook(index) {
            books.splice(index,1);
            localStorage.setItem('books',JSON.stringify(books));
            showbooks();
        }
        document.addEventListener('DOMContentLoaded', showbooks);
        // showbooks();
        </script>
</body>
</html>
